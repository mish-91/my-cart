<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Smart Shopper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <h1 class="login-title">Smart Shopper</h1>
      <p class="login-subtitle">Sign in to sync your lists</p>

      <div class="login-error" id="error-msg"></div>

      <div class="ff">
        <div class="fl">Email Address</div>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>

      <div class="ff" style="margin-bottom: 24px;">
        <div class="fl">Password</div>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <div style="display:flex; flex-direction:column; gap:12px;">
        <button class="btn b-pri" id="login-btn" style="width:100%;">Log In</button>
        <button class="btn b-ghost" id="register-btn" style="width:100%;">Create Account</button>
        
        <div style="text-align:center; margin: 12px 0;">
          <span style="font-size:12px; color:var(--muted); background:#fff; padding:0 10px;">OR</span>
        </div>

        <button class="btn b-ghost" onclick="window.location.href='home.html'" style="width:100%;">Continue as Guest</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // You will update these values later with your Firebase details
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const registerBtn = document.getElementById('register-btn');
    const errorMsg = document.getElementById('error-msg');

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.style.display = 'block';
    }

    // Login logic
    loginBtn.addEventListener('click', () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      if (!email || !password) return showError("Please enter email and password");

      loginBtn.textContent = "Loading...";
      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          // Logged in successfully, go to app
          window.location.href = 'home.html';
        })
        .catch((error) => {
          showError(error.message);
          loginBtn.textContent = "Log In";
        });
    });

    // Register logic
    registerBtn.addEventListener('click', () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      if (!email || !password) return showError("Please enter email and password");

      registerBtn.textContent = "Loading...";
      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          // Registered and logged in, go to app
          window.location.href = 'home.html';
        })
        .catch((error) => {
          showError(error.message);
          registerBtn.textContent = "Create Account";
        });
    });
  </script>
</body>
</html>
