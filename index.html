<!DOCTYPE html>
<html lang="en">
 <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Shopper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Base Styles */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg:#F6F7F9; --card:#FFFFFF; --text:#111827; --muted:#6B7280; --border:rgba(17,24,39,0.10); --blue:#3B82F6; --red:#EF4444; --amber:#F59E0B; --green:#3D7A5C; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); }
        .hidden { display: none !important; }
        
        /* Landing Page */
        .landing { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 24px; text-align: center; }
        .landing h1 { font-size: 40px; font-weight: 800; margin-bottom: 16px; color: #111827; }
        .landing p { color: var(--muted); margin-bottom: 40px; max-width: 320px; font-size: 16px; }
        
        /* Buttons & Modals (Rest of your original CSS goes here) */
        .app { max-width: 640px; margin: 0 auto; min-height: 100vh; background: var(--bg); padding-bottom: 120px; }
        .btn { display: inline-flex; align-items: center; padding: 12px 24px; border-radius: 999px; border: none; font-size: 16px; cursor: pointer; transition: all .2s; }
        .b-pri { background: #111827; color: #fff; width: 280px; justify-content: center; margin-bottom: 12px; }
        .b-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); width: 280px; justify-content: center; }
        .mbg { position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(5px); }
        .mdl { background: white; padding: 32px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

     /* refer to firebase config
        const firebaseConfig = {

        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.fbAuth = auth;
        window.fbDb = db;
        window.fbDoc = doc;
        window.fbSetDoc = setDoc;

        window.toggleApp = (loggedIn) => {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    const d = docSnap.data();
                    items = d.items || [];
                    pantry = d.pantry || [];
                    savedLists = d.savedLists || [];
                    render();
                }
                window.toggleApp(true);
            }
        });
    </script>
<body>

    <div id="landing-page" class="landing">
        <h1>Smart Shopper</h1>
        <p>Sync your lists across devices or continue as a guest to use locally.</p>
        <button class="btn b-pri" onclick="document.getElementById('modal-login').classList.remove('hidden')">Login / Sign Up</button>
        <button class="btn b-ghost" onclick="window.toggleApp(false); window.location.href='home.html';">Continue as Guest</button>
    </div>

    <div id="main-app" class="app hidden">
        </div>

    <div class="mbg hidden" id="modal-login">
        <div class="mdl">
            <h2 style="margin-bottom:20px">Login / Register</h2>
            <input type="email" id="login-email" placeholder="Email" style="width:100%; margin-bottom:10px; padding:12px; border-radius:8px; border:1px solid #ccc">
            <input type="password" id="login-password" placeholder="Password" style="width:100%; margin-bottom:20px; padding:12px; border-radius:8px; border:1px solid #ccc">
            <button class="btn b-pri" style="width:100%" onclick="handleAuth()">Sign In / Create Account</button>
        </div>
    </div>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Shopper</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="style.css">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

  // TODO: Replace with your actual Firebase config
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Expose methods to global scope so your inline HTML calls can use them
  window.fbAuth = auth;
  window.fbDb = db;
  window.fbDoc = doc;
  window.fbSetDoc = setDoc;
  window.fbSignIn = signInWithEmailAndPassword;
  window.fbCreateUser = createUserWithEmailAndPassword;
  window.fbSignOut = signOut;

  // Listen for login state changes
  onAuthStateChanged(auth, async (user) => {
    const authBtn = document.getElementById('auth-btn');
    if (user) {
      // Setup UI for logged in
      authBtn.textContent = 'Logout';
      authBtn.onclick = () => window.fbSignOut(auth);
      
      // Fetch user data from Cloud Firestore
      const docSnap = await getDoc(doc(db, "users", user.uid));
      if (docSnap.exists()) {
        const data = docSnap.data();
        if (window.updateDataFromCloud) {
          window.updateDataFromCloud(data.items || [], data.pantry || [], data.savedLists || []);
        }
      }
    } else {
      // Setup UI for logged out
      authBtn.textContent = 'Login';
      authBtn.onclick = () => window.toggleLoginModal(true);
    }
  });
</script>

</head>
</html>
